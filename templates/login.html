<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Sistema Tickets</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 50%, #0f172a 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    .login-card {
      background: #ffffff;
      border-radius: 20px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.4);
    }
    .brand {
      text-align: center;
      margin-bottom: 36px;
    }
    .brand-icon {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, #1d4ed8, #3b82f6);
      border-radius: 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
      box-shadow: 0 8px 24px rgba(59,130,246,0.35);
    }
    .brand-icon i { color: white; font-size: 32px; }
    .brand h1 { font-size: 28px; font-weight: 700; color: #0f172a; }
    .brand p { color: #64748b; font-size: 14px; margin-top: 4px; }
    .form-label { font-weight: 600; color: #374151; font-size: 14px; }
    .form-control {
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 15px;
      transition: all 0.2s;
    }
    .form-control:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
    }
    .input-group-text {
      background: #f8fafc;
      border: 1.5px solid #e2e8f0;
      border-right: none;
      border-radius: 10px 0 0 10px;
      color: #64748b;
    }
    .input-group .form-control { border-left: none; border-radius: 0 10px 10px 0; }
    .btn-login {
      background: linear-gradient(135deg, #1d4ed8, #3b82f6);
      border: none;
      border-radius: 10px;
      padding: 13px;
      font-size: 16px;
      font-weight: 600;
      color: white;
      width: 100%;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 14px rgba(59,130,246,0.4);
    }
    .btn-login:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(59,130,246,0.5); }
    .alert-error {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #dc2626;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .mb-4 { margin-bottom: 20px; }
    .mb-6 { margin-bottom: 24px; }
    .footer-text {
      text-align: center;
      color: #94a3b8;
      font-size: 12px;
      margin-top: 28px;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="brand">
      <div class="brand-icon">
        <i class="fa-solid fa-ticket-simple"></i>
      </div>
      <h1>Tickets</h1>
      <p>Sistema de Gerenciamento de Chamados</p>
    </div>

    {% if error %}
    <div class="alert-error mb-4">
      <i class="fa-solid fa-circle-exclamation"></i> {{ error }}
    </div>
    {% endif %}

    <form method="POST" action="{{ url_for('login') }}">
      <div class="mb-4">
        <label class="form-label">Usuário</label>
        <div class="input-group">
          <span class="input-group-text"><i class="fa-solid fa-user"></i></span>
          <input type="text" name="username" class="form-control" placeholder="Digite seu usuário" required autofocus />
        </div>
      </div>
      <div class="mb-6">
        <label class="form-label">Senha</label>
        <div class="input-group">
          <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
          <input type="password" name="password" class="form-control" placeholder="Digite sua senha" required />
        </div>
      </div>
      <button type="submit" class="btn-login">
        <i class="fa-solid fa-right-to-bracket"></i> &nbsp;Entrar
      </button>
    </form>

    <div class="footer-text">
      Sistema Tickets &copy; 2024 — Uso interno
    </div>
  </div>
</body>
</html>
